<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Solar Situation Viewer</title>
<style>
  body{margin:0;background:#101014;color:#eee;font-family:system-ui,sans-serif}
  header{padding:16px 20px;background:#181820;border-bottom:1px solid #333}
  button{margin:4px;padding:10px 14px;border:0;border-radius:8px;cursor:pointer}
  main{padding:16px}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:16px}
  .card{background:#1b1b24;border:1px solid #333;border-radius:14px;padding:14px}
  .sunbox{position:relative;width:100%;aspect-ratio:1/1;background:#000;border-radius:12px;overflow:hidden}
  canvas,img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain}
  pre{white-space:pre-wrap;background:#08080a;padding:10px;border-radius:8px;max-height:260px;overflow:auto}
  .small{font-size:13px;color:#bbb}
</style>
</head>
<body>

<header>
  <h2>Solar Situation Viewer</h2>
  <button onclick="loadAll()">全部取得</button>
  <button onclick="loadRegions()">黒点・活動領域</button>
  <button onclick="loadSynoptic()">Solar Synoptic Map</button>
  <button onclick="loadCoronalHole()">コロナホール画像</button>
  <button onclick="loadCmeSep()">CME/SEP候補</button>
</header>

<main>
  <div class="grid">

    <section class="card">
      <h3>① 黒点・活動領域 太陽面</h3>
      <div class="sunbox">
        <canvas id="sunCanvas"></canvas>
      </div>
      <div id="regionText" class="small"></div>
    </section>

    <section class="card">
      <h3>② コロナホール 太陽面</h3>
      <div class="sunbox">
        <img id="chImage" alt="">
      </div>
      <div id="chText" class="small"></div>
    </section>

    <section class="card">
      <h3>③ CME/SEP候補 太陽面</h3>
      <div class="sunbox">
        <img id="cmeImage" alt="">
        <canvas id="eventCanvas"></canvas>
      </div>
      <div id="eventText" class="small"></div>
    </section>

  </div>

  <section class="card" style="margin-top:16px">
    <h3>Raw Output</h3>
    <pre id="raw">ここにAPI結果を表示</pre>
  </section>
</main>

<script>
const API = {
  regions: "https://services.swpc.noaa.gov/json/solar_regions.json",
  xray: "https://services.swpc.noaa.gov/json/goes/primary/xray-flares-7-day.json",
  proton: "https://services.swpc.noaa.gov/json/goes/primary/integral-protons-6-hour.json",
  synoptic: "https://services.swpc.noaa.gov/images/synoptic-map.jpg",
  suvi195: "https://services.swpc.noaa.gov/images/animations/suvi/primary/195/latest.png",
  suviMap: "https://services.swpc.noaa.gov/images/animations/suvi/primary/map/latest.png"
};

async function fetchJson(url){
  const r = await fetch(url);
  if(!r.ok) throw new Error(r.status);
  return await r.json();
}

function raw(obj){
  document.getElementById("raw").textContent = JSON.stringify(obj,null,2);
}

function drawBaseSun(canvasId){
  const c = document.getElementById(canvasId);
  const dpr = devicePixelRatio || 1;
  const rect = c.getBoundingClientRect();
  c.width = rect.width * dpr;
  c.height = rect.height * dpr;
  const ctx = c.getContext("2d");
  ctx.scale(dpr,dpr);
  const w = rect.width, h = rect.height;
  const cx=w/2, cy=h/2, r=Math.min(w,h)*0.39;

  ctx.clearRect(0,0,w,h);
  ctx.beginPath();
  ctx.arc(cx,cy,r,0,Math.PI*2);
  ctx.fillStyle="#f7b733";
  ctx.fill();
  ctx.strokeStyle="#fff3";
  ctx.lineWidth=2;
  ctx.stroke();

  ctx.fillStyle="#fff";
  ctx.font="12px system-ui";
  ctx.fillText("N",cx-4,cy-r-8);
  ctx.fillText("S",cx-4,cy+r+18);
  ctx.fillText("E",cx-r-20,cy+4);
  ctx.fillText("W",cx+r+10,cy+4);

  return {ctx,w,h,cx,cy,r};
}

function latLonToXY(lat, lon, cx, cy, r){
  // 簡易投影：longitude -90〜+90を太陽面左右に配置
  const x = cx + (lon / 90) * r;
  const y = cy - (lat / 90) * r;
  return {x,y};
}

async function loadRegions(){
  const data = await fetchJson(API.regions);
  const latest = data.filter(x => x.region).slice(-30);

  const {ctx,cx,cy,r} = drawBaseSun("sunCanvas");

  latest.forEach(ar=>{
    const lat = Number(ar.latitude || ar.lat || 0);
    const lon = Number(ar.longitude || ar.lon || 0);
    const area = Number(ar.area || ar.spot_area || 80);
    const p = latLonToXY(lat, lon, cx, cy, r);

    ctx.beginPath();
    ctx.arc(p.x,p.y,Math.max(4,Math.sqrt(area)/2),0,Math.PI*2);
    ctx.fillStyle="#111";
    ctx.fill();
    ctx.strokeStyle="#ff4040";
    ctx.stroke();

    ctx.fillStyle="#fff";
    ctx.font="12px system-ui";
    ctx.fillText("AR"+ar.region,p.x+7,p.y-7);
  });

  document.getElementById("regionText").innerHTML =
    `活動領域数: <b>${latest.length}</b><br>` +
    latest.map(x=>`AR${x.region} lat:${x.latitude ?? "?"} lon:${x.longitude ?? "?"} class:${x.mcintosh_class ?? "?"}`).join("<br>");

  raw({solar_regions:latest});
}

async function loadSynoptic(){
  document.getElementById("chImage").src = API.synoptic + "?t=" + Date.now();
  document.getElementById("chText").innerHTML =
    "Solar Synoptic Mapを表示。活動領域、コロナホール、磁気中性線の確認用。";
}

async function loadCoronalHole(){
  document.getElementById("chImage").src = API.suviMap + "?t=" + Date.now();
  document.getElementById("chText").innerHTML =
    "SUVI Thematic Mapを表示。凡例上の Coronal Hole 領域をコロナホールとして確認。";
}

async function loadCmeSep(){
  document.getElementById("cmeImage").src = API.suvi195 + "?t=" + Date.now();

  const [flares, protons] = await Promise.all([
    fetchJson(API.xray),
    fetchJson(API.proton)
  ]);

  const latestP10 = protons.filter(x => String(x.energy).includes(">=10 MeV")).at(-1);
  const recentFlares = flares.slice(-10);

  const {ctx,cx,cy,r} = drawBaseSun("eventCanvas");

  recentFlares.forEach((f,i)=>{
    const angle = (i/recentFlares.length)*Math.PI*2;
    const x = cx + Math.cos(angle)*r*0.45;
    const y = cy + Math.sin(angle)*r*0.45;

    ctx.beginPath();
    ctx.arc(x,y,10,0,Math.PI*2);
    ctx.fillStyle="rgba(255,0,80,.75)";
    ctx.fill();

    ctx.fillStyle="#fff";
    ctx.font="12px system-ui";
    ctx.fillText(f.class_type || "flare",x+12,y);
  });

  const sepLevel = latestP10 && latestP10.flux >= 10 ? "S1以上の可能性" : "S0〜注意";
  document.getElementById("eventText").innerHTML =
    `>=10MeV Proton: <b>${latestP10?.flux ?? "不明"}</b> pfu<br>` +
    `SEP判定: <b>${sepLevel}</b><br>` +
    `直近フレア数: ${recentFlares.length}`;

  raw({recent_flares:recentFlares, latest_proton_10MeV:latestP10});
}

async function loadAll(){
  await loadRegions();
  await loadCoronalHole();
  await loadCmeSep();
}
</script>
</body>
</html>
