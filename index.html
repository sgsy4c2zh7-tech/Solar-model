<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Advanced SRS Solar Operations Console</title>

<style>
:root{
  --bg:#06070b;
  --panel:#111622;
  --panel2:#171d2c;
  --line:#2b3448;
  --text:#eef3ff;
  --muted:#9aa6c0;
  --accent:#4fc3f7;

  --risk-low:#8bc34a;
  --risk-mid:#ffee58;
  --risk-high:#ff9800;
  --risk-severe:#ff1744;
}

*{box-sizing:border-box}

body{
  margin:0;
  background:
    radial-gradient(circle at top,#1b2236 0%,#06070b 62%);
  color:var(--text);
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}

header{
  position:sticky;
  top:0;
  z-index:20;
  background:rgba(10,12,20,.92);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--line);
  padding:14px 18px;
}

h1{
  margin:0 0 10px;
  font-size:22px;
}

button,input,select{
  font:inherit;
}

button{
  border:0;
  border-radius:10px;
  padding:10px 14px;
  cursor:pointer;
  font-weight:800;
  color:#fff;
  background:#263248;
}

button:hover{
  filter:brightness(1.12);
}

button.primary{
  background:#0277bd;
}

button.red{
  background:#8e2430;
}

.topbar{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  align-items:center;
}

.status{
  font-size:13px;
  color:var(--muted);
}

main{
  padding:14px;
}

.layout{
  display:grid;
  grid-template-columns:minmax(420px,1.45fr) minmax(350px,.9fr);
  gap:14px;
}

.card{
  background:
    linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02));
  border:1px solid var(--line);
  border-radius:18px;
  padding:14px;
  box-shadow:0 10px 30px rgba(0,0,0,.28);
}

.sunWrap{
  position:relative;
  width:100%;
  aspect-ratio:1/1;
  background:#000;
  border-radius:18px;
  overflow:hidden;
  border:1px solid #2a3347;
}

canvas{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
}

.overlay{
  position:absolute;
  left:12px;
  top:12px;
  z-index:2;

  background:rgba(5,7,12,.72);
  border:1px solid rgba(255,255,255,.14);
  border-radius:12px;

  padding:10px 12px;
  line-height:1.45;
}

.overlay .big{
  font-size:18px;
  font-weight:900;
}

.overlay .small{
  font-size:12px;
  color:#c4cee3;
}

.sliderBox{
  margin-top:12px;
}

.sliderRow{
  display:grid;
  grid-template-columns:auto 1fr auto;
  gap:10px;
  align-items:center;
}

input[type=range]{
  width:100%;
}

.small{
  font-size:13px;
  color:var(--muted);
  line-height:1.5;
}

.kpis{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
  margin-top:10px;
}

.kpi{
  background:rgba(255,255,255,.04);
  border:1px solid var(--line);
  border-radius:12px;
  padding:10px;
}

.kpi .label{
  font-size:12px;
  color:var(--muted);
}

.kpi .value{
  font-size:22px;
  font-weight:900;
}

.sideGrid{
  display:grid;
  gap:14px;
}

.flareCard{
  background:
    linear-gradient(180deg,rgba(255,255,255,.04),rgba(255,255,255,.02));
  border:1px solid var(--line);
  border-radius:14px;
  padding:10px;
}

.flareNow{
  border-left:5px solid #ff1744;
}

.flareM{
  border-left:5px solid #ff9800;
}

.flareC{
  border-left:5px solid #ffee58;
}

.flareB{
  border-left:5px solid #90a4ae;
}

.flareTitle{
  font-size:16px;
  font-weight:900;
}

.timeline{
  margin-top:10px;
  height:42px;
  border-radius:10px;
  position:relative;
  overflow:hidden;
  background:#0d111a;
  border:1px solid var(--line);
}

.tick{
  position:absolute;
  top:0;
  bottom:0;
  width:2px;
  background:#263248;
}

.nowLine{
  position:absolute;
  top:0;
  bottom:0;
  width:3px;
  background:#4fc3f7;
}

.event{
  position:absolute;
  top:7px;
  width:12px;
  height:12px;
  border-radius:50%;
  transform:translateX(-50%);
}

.event.X{background:#ff1744}
.event.M{background:#ff9800}
.event.C{background:#ffee58}
.event.B{background:#90a4ae}

.tableWrap{
  max-height:420px;
  overflow:auto;
  border:1px solid var(--line);
  border-radius:12px;
}

table{
  width:100%;
  border-collapse:collapse;
  font-size:13px;
}

th,td{
  border-bottom:1px solid #2c3448;
  padding:7px 6px;
  text-align:left;
  white-space:nowrap;
}

th{
  background:#111827;
  position:sticky;
  top:0;
}

tr:hover{
  background:rgba(79,195,247,.08);
  cursor:pointer;
}

tr.selected{
  background:rgba(79,195,247,.16);
}

.badge{
  display:inline-block;
  padding:2px 7px;
  border-radius:999px;
  font-weight:900;
  color:#050505;
}

.detailBox{
  background:rgba(255,255,255,.04);
  border:1px solid var(--line);
  border-radius:12px;
  padding:10px;
}

.colorGrid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}

.colorItem{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:8px;

  background:rgba(255,255,255,.035);
  border:1px solid var(--line);
  border-radius:10px;
  padding:8px;
  font-size:13px;
}

.colorItem input{
  width:42px;
  height:30px;
  border:0;
  background:transparent;
}

pre{
  white-space:pre-wrap;
  background:#05070c;
  border:1px solid var(--line);
  border-radius:12px;
  padding:10px;
  max-height:320px;
  overflow:auto;
}

@media(max-width:980px){
  .layout{
    grid-template-columns:1fr;
  }
  .kpis{
    grid-template-columns:1fr 1fr;
  }
}
</style>
</head>

<body>

<header>
  <h1>Advanced SRS Solar Operations Console</h1>

  <div class="topbar">
    <button class="primary" onclick="initialize()">最新データ取得</button>
    <button id="playBtn" onclick="togglePlay()">▶ 再生</button>
    <button onclick="resetTime()">基準へ戻す</button>
    <button onclick="savePNG()">PNG保存</button>

    <span id="status" class="status">未取得</span>
  </div>
</header>

<main>

<div class="layout">

<section class="card">

<h2>Solar Disk</h2>

<div class="sunWrap">
  <canvas id="sunCanvas"></canvas>

  <div class="overlay">
    <div class="big" id="timeUTC">---</div>
    <div class="small" id="timeInfo">---</div>
  </div>
</div>

<div class="sliderBox">

<div class="sliderRow">
  <span class="small">-7日</span>

  <input
    id="timeSlider"
    type="range"
    min="-336"
    max="336"
    step="1"
    value="0"
    oninput="redraw()"
  />

  <span class="small">+7日</span>
</div>

<div class="small">
過去側：実測SRS / 未来側：回転予測（30分刻み）
</div>

<div class="timeline" id="timeline"></div>

<div class="kpis">
  <div class="kpi">
    <div class="label">Visible AR</div>
    <div class="value" id="kpiVisible">0</div>
  </div>

  <div class="kpi">
    <div class="label">Hidden</div>
    <div class="value" id="kpiHidden">0</div>
  </div>

  <div class="kpi">
    <div class="label">Max Risk</div>
    <div class="value" id="kpiRisk">0</div>
  </div>

  <div class="kpi">
    <div class="label">Flare NOW</div>
    <div class="value" id="kpiFlare">-</div>
  </div>
</div>

</div>
</section>

<aside class="sideGrid">

<section class="card">

<h2>Current / Recent Flares</h2>

<div id="flareList" class="small">
未取得
</div>

</section>

<section class="card">

<h2>Selected AR</h2>

<div id="detail" class="small">
ARをクリックしてください
</div>

</section>

<section class="card">

<h2>Color Settings</h2>

<div class="colorGrid">

<label class="colorItem">
Low
<input id="riskLow" type="color" value="#8bc34a" oninput="redraw()">
</label>

<label class="colorItem">
Watch
<input id="riskMid" type="color" value="#ffee58" oninput="redraw()">
</label>

<label class="colorItem">
Medium
<input id="riskHigh" type="color" value="#ff9800" oninput="redraw()">
</label>

<label class="colorItem">
High
<input id="riskSevere" type="color" value="#ff1744" oninput="redraw()">
</label>

</div>

<div style="margin-top:10px" class="small">
<label><input id="showGrid" type="checkbox" checked onchange="redraw()"> Grid</label><br>
<label><input id="showLabels" type="checkbox" checked onchange="redraw()"> Labels</label><br>
<label><input id="showMag" type="checkbox" checked onchange="redraw()"> Magnetic Structure</label><br>
<label><input id="hideBack" type="checkbox" checked onchange="redraw()"> Hide Backside</label>
</div>

</section>

</aside>

</div>

<section class="card" style="margin-top:14px">

<h2>AR Table</h2>

<div class="tableWrap">
<table>
<thead>
<tr>
<th>AR</th>
<th>磁場</th>
<th>Area</th>
<th>NN</th>
<th>Risk</th>
<th>Lon</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>
</table>
</div>

</section>

<section class="card" style="margin-top:14px">

<h2>Raw SRS</h2>

<pre id="raw">未取得</pre>

</section>

</main>

<script>

const CURRENT_SRS =
"https://services.swpc.noaa.gov/text/srs.txt";

const GOES_FLARE =
"https://services.swpc.noaa.gov/json/goes/primary/xrays-7-day.json";

const SOLAR_ROT_DEG_PER_DAY = 13.2;

let state = {
  srsHistory:{},
  latest:null,
  flares:[],
  selectedAR:null,
  playing:false,
  timer:null
};

function $(id){
  return document.getElementById(id);
}

async function initialize(){

  $("status").textContent = "取得中...";

  try{

    await Promise.all([
      loadSRSHistory(),
      loadFlares()
    ]);

    redraw();
    renderTimeline();

    $("status").textContent =
      "取得完了";

  }catch(e){

    $("status").textContent =
      "取得失敗: " + e.message;
  }
}

async function loadSRSHistory(){

  const today = new Date();

  const jobs = [];

  for(let i=-7;i<=0;i++){

    const d = new Date(today);
    d.setUTCDate(today.getUTCDate()+i);

    const y = d.getUTCFullYear();
    const m = pad(d.getUTCMonth()+1);
    const dd = pad(d.getUTCDate());

    const url =
`https://services.swpc.noaa.gov/text/solar_regions/${y}/${m}/SRS_${y}${m}${dd}.txt`;

    jobs.push(
      fetch(url)
        .then(r=>r.ok ? r.text() : null)
        .then(text=>{
          if(!text) return;

          const parsed = parseSRS(text);

          const key =
            dateKey(parsed.validDate);

          state.srsHistory[key] = parsed;

          state.latest = parsed;
        })
        .catch(()=>{})
    );
  }

  await Promise.all(jobs);

  if(state.latest){
    $("raw").textContent =
      state.latest.raw;
  }
}

async function loadFlares(){

  try{

    const res = await fetch(
      GOES_FLARE + "?t=" + Date.now()
    );

    const json = await res.json();

    state.flares =
      json
        .filter(x=>x.energy)
        .slice(-60);

  }catch(e){

    console.warn(e);
  }
}

function parseSRS(text){

  const lines =
    text.split(/\r?\n/);

  const issued =
    (text.match(/:Issued:\s*(.+)/)||[])[1] || "";

  const valid =
    (text.match(/Locations Valid at\s*(.+)/i)||[])[1] || "";

  const validDate =
    parseNOAADate(valid) ||
    new Date();

  let inSection = false;

  const regions = [];

  for(const line of lines){

    if(line.startsWith("I.  Regions with Sunspots")){
      inSection = true;
      continue;
    }

    if(inSection && line.startsWith("IA.")) break;
    if(!inSection) continue;

    const m =
      line.trim().match(
/^(\d{4})\s+([NS]\d{2}[EW]\d{2})\s+(\d+)\s+(\d+)\s+([A-Za-z]+)\s+(\d+)\s+(\d+)\s+(.+)$/
      );

    if(!m) continue;

    const [
      ,
      number,
      location,
      lo,
      area,
      z,
      ll,
      nn,
      magType
    ] = m;

    const pos =
      parseLocation(location);

    regions.push({
      number,
      location,
      lat:pos.lat,
      lon:pos.lon,
      area:Number(area),
      spots:Number(nn),
      length:Number(ll),
      mcintosh:z,
      magType:magType.trim(),
      risk:calcRisk(
        Number(area),
        Number(nn),
        z,
        magType.trim()
      )
    });
  }

  return {
    issued,
    valid,
    validDate,
    regions,
    raw:text
  };
}

function parseNOAADate(s){

  if(!s) return null;

  const cleaned =
    s.replace(/UTC/i,"").trim();

  const d =
    new Date(cleaned + " UTC");

  if(!isNaN(d)) return d;

  return null;
}

function parseLocation(loc){

  const m =
    loc.match(
      /^([NS])(\d{2})([EW])(\d{2})$/
    );

  if(!m) return {lat:0, lon:0};

  const lat =
    (m[1]==="N"?1:-1) * Number(m[2]);

  const lon =
    (m[3]==="W"?1:-1) * Number(m[4]);

  return {lat, lon};
}

function calcRisk(area,spots,mcintosh,mag){

  let score = 0;

  score += Math.min(30, area/10);
  score += Math.min(20, spots*2);

  const m = mag.toLowerCase();

  if(m.includes("alpha")) score += 5;
  if(m.includes("beta")) score += 15;
  if(m.includes("gamma")) score += 25;
  if(m.includes("delta")) score += 35;

  return Math.min(100, Math.round(score));
}

function getCurrentDate(){

  if(!state.latest)
    return new Date();

  const halfHours =
    Number($("timeSlider").value);

  return new Date(
    state.latest.validDate.getTime()
    +
    halfHours * 30 * 60 * 1000
  );
}

function getDataset(){

  if(!state.latest)
    return null;

  const slider =
    Number($("timeSlider").value);

  const currentDate =
    getCurrentDate();

  // 過去側：実測
  if(slider <= 0){

    const key =
      dateKey(currentDate);

    if(state.srsHistory[key])
      return {
        mode:"observed",
        data:state.srsHistory[key]
      };
  }

  // 未来側：予測
  return {
    mode:"forecast",
    data:state.latest
  };
}

function redraw(){

  updateTimeLabel();

  const dataset =
    getDataset();

  if(!dataset) return;

  renderSolarDisk(dataset);
  renderTable(dataset);
  renderDetail(dataset);
  renderFlarePanel();
}

function renderSolarDisk(dataset){

  const {
    ctx,
    w,
    h,
    cx,
    cy,
    r
  } = setupCanvas();

  ctx.clearRect(0,0,w,h);

  drawBackground(ctx,w,h,cx,cy,r);

  if($("showGrid").checked)
    drawGrid(ctx,cx,cy,r);

  const visible = [];
  let hidden = 0;

  dataset.data.regions.forEach(ar=>{

    const lon =
      dataset.mode==="forecast"
      ?
      normalize180(
        ar.lon
        +
        getDeltaDays() *
        SOLAR_ROT_DEG_PER_DAY
      )
      :
      ar.lon;

    const p =
      project(
        ar.lat,
        lon,
        cx,
        cy,
        r
      );

    if($("hideBack").checked && p.z < 0){
      hidden++;
      return;
    }

    visible.push(ar);

    drawAR(
      ctx,
      ar,
      p,
      lon
    );
  });

  $("kpiVisible").textContent =
    visible.length;

  $("kpiHidden").textContent =
    hidden;

  $("kpiRisk").textContent =
    Math.max(
      ...dataset.data.regions.map(r=>r.risk)
    );
}

function drawAR(ctx,ar,p,lon){

  const color =
    riskColor(ar.risk);

  const size =
    Math.max(
      6,
      Math.min(
        28,
        Math.sqrt(ar.area)*0.78
      )
    );

  const selected =
    state.selectedAR===ar.number;

  ctx.save();

  ctx.globalAlpha =
    Math.max(.35,p.z);

  // glow
  ctx.beginPath();
  ctx.arc(
    p.x,
    p.y,
    size + (selected?18:10),
    0,
    Math.PI*2
  );

  ctx.fillStyle =
    hexToRgba(
      color,
      selected?.42:.22
    );

  ctx.fill();

  // main
  ctx.beginPath();

  ctx.arc(
    p.x,
    p.y,
    size,
    0,
    Math.PI*2
  );

  ctx.fillStyle="#000";
  ctx.fill();

  ctx.strokeStyle=color;
  ctx.lineWidth=2;
  ctx.stroke();

  // label
  if($("showLabels").checked){

    ctx.fillStyle="#fff";

    ctx.font =
      selected
      ?
      "900 13px system-ui"
      :
      "700 12px system-ui";

    ctx.fillText(
      "AR"+ar.number,
      p.x+size+10,
      p.y-18
    );

    // magnetic label
    ctx.fillStyle =
      magneticColor(ar.magType);

    ctx.font =
      "900 16px system-ui";

    ctx.fillText(
      magneticShort(ar.magType),
      p.x+size+10,
      p.y
    );

    ctx.fillStyle=color;

    ctx.font =
      "800 12px system-ui";

    ctx.fillText(
      "R"+ar.risk,
      p.x+size+10,
      p.y+16
    );
  }

  if($("showMag").checked){

    drawMagneticFX(
      ctx,
      ar,
      p,
      size
    );
  }

  // flare highlight
  const flare =
    latestFlareForAR(ar.number);

  if(flare){

    ctx.strokeStyle =
      flareColor(flare.class);

    ctx.lineWidth=3;

    ctx.beginPath();

    ctx.arc(
      p.x,
      p.y,
      size+9,
      0,
      Math.PI*2
    );

    ctx.stroke();

    ctx.fillStyle =
      flareColor(flare.class);

    ctx.font =
      "900 13px system-ui";

    ctx.fillText(
      flare.class,
      p.x-size,
      p.y-size-8
    );
  }

  ctx.restore();
}

function drawMagneticFX(ctx,ar,p,size){

  const m =
    ar.magType.toLowerCase();

  if(m.includes("gamma")){

    ctx.strokeStyle =
      "rgba(255,255,255,.7)";

    ctx.lineWidth=1.3;

    for(let i=0;i<3;i++){

      ctx.beginPath();

      const yy =
        p.y-size*.5+i*size*.45;

      ctx.moveTo(
        p.x-size*.9,
        yy
      );

      ctx.bezierCurveTo(
        p.x-size*.2,
        yy-size*.5,
        p.x+size*.2,
        yy+size*.5,
        p.x+size*.9,
        yy
      );

      ctx.stroke();
    }
  }

  if(m.includes("delta")){

    ctx.strokeStyle="#ff1744";

    ctx.lineWidth=2.5;

    ctx.beginPath();

    ctx.arc(
      p.x,
      p.y,
      size*1.45,
      0,
      Math.PI*2
    );

    ctx.stroke();
  }
}

function renderFlarePanel(){

  if(!state.flares.length){

    $("flareList").textContent =
      "フレアデータなし";

    return;
  }

  const recent =
    state.flares.slice(-10).reverse();

  $("flareList").innerHTML =
    recent.map(f=>{

      const cls =
        flareCssClass(f.energy);

      return `
<div class="flareCard ${cls}">
<div class="flareTitle">
${f.energy}
</div>

<div>
${fmtUTC(new Date(f.time_tag))}
</div>

<div class="small">
${f.satellite || ""}
</div>
</div>
      `;
    }).join("");

  const latest =
    recent[0];

  if(latest)
    $("kpiFlare").textContent =
      latest.energy;
}

function renderTable(dataset){

  const rows =
    [...dataset.data.regions]
      .sort((a,b)=>b.risk-a.risk);

  $("tableBody").innerHTML =
    rows.map(r=>{

      const color =
        riskColor(r.risk);

      const lon =
        dataset.mode==="forecast"
        ?
        normalize180(
          r.lon
          +
          getDeltaDays() *
          SOLAR_ROT_DEG_PER_DAY
        )
        :
        r.lon;

      return `
<tr
data-ar="${r.number}"
class="${
state.selectedAR===r.number
?
"selected"
:
""
}"
>

<td>${r.number}</td>

<td style="
font-weight:900;
color:${magneticColor(r.magType)}
">
${magneticShort(r.magType)}
</td>

<td>${r.area}</td>

<td>${r.spots}</td>

<td>
<span
class="badge"
style="background:${color}"
>
${r.risk}
</span>
</td>

<td>${formatLon(lon)}</td>

</tr>
      `;
    }).join("");

  document
    .querySelectorAll("tr[data-ar]")
    .forEach(tr=>{

      tr.onclick=()=>{

        state.selectedAR =
          tr.dataset.ar;

        redraw();
      };
    });
}

function renderDetail(dataset){

  const ar =
    dataset.data.regions.find(

function renderTimeline(){

  const tl =
    $("timeline");

  tl.innerHTML="";

  for(let i=-7;i<=7;i++){

    const x =
      ((i+7)/14)*100;

    const tick =
      document.createElement("div");

    tick.className="tick";

    tick.style.left =
      x + "%";

    tl.appendChild(tick);
  }

  const now =
    document.createElement("div");

  now.className="nowLine";
  now.style.left="50%";

  tl.appendChild(now);

  state.flares.forEach(f=>{

    const d =
      new Date(f.time_tag);

    const diff =
      (
        d -
        state.latest.validDate
      ) / 86400000;

    if(diff < -7 || diff > 7)
      return;

    const x =
      ((diff+7)/14)*100;

    const ev =
      document.createElement("div");

    ev.className =
      "event " +
      flareLetter(f.energy);

    ev.style.left =
      x + "%";

    tl.appendChild(ev);
  });
}

function setupCanvas(){

  const c =
    $("sunCanvas");

  const dpr =
    window.devicePixelRatio || 1;

  const rect =
    c.getBoundingClientRect();

  c.width =
    rect.width * dpr;

  c.height =
    rect.height * dpr;

  const ctx =
    c.getContext("2d");

  ctx.setTransform(
    dpr,0,0,dpr,0,0
  );

  return {
    ctx,
    w:rect.width,
    h:rect.height,
    cx:rect.width/2,
    cy:rect.height/2,
    r:Math.min(rect.width,rect.height)*0.39
  };
}

function drawBackground(ctx,w,h,cx,cy,r){

  ctx.fillStyle="#000";
  ctx.fillRect(0,0,w,h);

  const g =
    ctx.createRadialGradient(
      cx-r*.25,
      cy-r*.25,
      r*.08,
      cx,
      cy,
      r
    );

  g.addColorStop(0,"#fff9c4");
  g.addColorStop(.42,"#ffd54f");
  g.addColorStop(.75,"#fb8c00");
  g.addColorStop(1,"#bf360c");

  ctx.beginPath();
  ctx.arc(cx,cy,r,0,Math.PI*2);

  ctx.fillStyle=g;
  ctx.fill();

  ctx.strokeStyle=
    "rgba(255,255,255,.3)";

  ctx.lineWidth=2;

  ctx.stroke();
}

function drawGrid(ctx,cx,cy,r){

  ctx.strokeStyle=
    "rgba(255,255,255,.18)";

  ctx.lineWidth=1;

  [-60,-30,0,30,60]
    .forEach(lat=>{

      const y =
        cy -
        Math.sin(lat*Math.PI/180)*r;

      const scale =
        Math.cos(lat*Math.PI/180);

      ctx.beginPath();

      ctx.ellipse(
        cx,
        y,
        r*scale,
        r*.1,
        0,
        0,
        Math.PI*2
      );

      ctx.stroke();
    });
}

function project(latDeg,lonDeg,cx,cy,r){

  const lat =
    latDeg*Math.PI/180;

  const lon =
    lonDeg*Math.PI/180;

  const x =
    cx +
    r*Math.cos(lat)*Math.sin(lon);

  const y =
    cy -
    r*Math.sin(lat);

  const z =
    Math.cos(lat)*Math.cos(lon);

  return {x,y,z};
}

function updateTimeLabel(){

  if(!state.latest) return;

  const d =
    getCurrentDate();

  const jst =
    new Date(
      d.getTime()+9*3600000
    );

  $("timeUTC").textContent =
    "UTC " + fmtUTC(d);

  const slider =
    Number($("timeSlider").value);

  $("timeInfo").innerHTML = `
JST ${fmtJST(jst)}<br>
${slider<=0 ? "Observed SRS" : "Forecast Rotation"}<br>
Base:
${fmtUTC(state.latest.validDate)}
  `;
}

function togglePlay(){

  state.playing =
    !state.playing;

  $("playBtn").textContent =
    state.playing
    ?
    "⏸ 停止"
    :
    "▶ 再生";

  if(state.playing){

    state.timer =
      setInterval(()=>{

        let v =
          Number(
            $("timeSlider").value
          );

        v++;

        if(v>336)
          v=-336;

        $("timeSlider").value=v;

        redraw();

      },180);

  }else{

    clearInterval(state.timer);
  }
}

function resetTime(){

  $("timeSlider").value=0;
  redraw();
}

function getDeltaDays(){

  return (
    getCurrentDate()
    -
    state.latest.validDate

}

function magneticShort(mag){

  const m =
    mag.toLowerCase();

  if(m.includes("beta")
    && m.includes("gamma")
    && m.includes("delta"))
      return "βγδ";

  if(m.includes("beta")
    && m.includes("delta"))
      return "βδ";

  if(m.includes("beta")
    && m.includes("gamma"))
      return "βγ";

  if(m.includes("beta"))
      return "β";

  if(m.includes("alpha"))
      return "α";

  return mag;
}

function magneticColor(mag){

  const m =
    mag.toLowerCase();

  if(m.includes("delta"))
    return "#ff1744";

  if(m.includes("gamma"))
    return "#ff9800";

  if(m.includes("beta"))
    return "#ffee58";

  if(m.includes("alpha"))
    return "#4fc3f7";

  return "#fff";
}

function flareLetter(c){

  if(!c) return "B";

  return c[0].toUpperCase();
}

function flareCssClass(c){

  const l =
    flareLetter(c);

  if(l==="X") return "flareNow";
  if(l==="M") return "flareM";
  if(l==="C") return "flareC";
  return "flareB";
}

function flareColor(c){

  const l =
    flareLetter(c);

  if(l==="X") return "#ff1744";
  if(l==="M") return "#ff9800";
  if(l==="C") return "#ffee58";

  return "#90a4ae";
}

function riskColor(score){

  if(score>=75)
    return $("riskSevere").value;

  if(score>=55)
    return $("riskHigh").value;

  if(score>=30)
    return $("riskMid").value;

  return $("riskLow").value;
}

function normalize180(x){

  return (
    ((x+180)%360+360)%360
  ) - 180;
}

function formatLon(lon){

  if(lon>=0)
    return `W${Math.abs(lon).toFixed(1)}°`;

  return `E${Math.abs(lon).toFixed(1)}°`;
}

function dateKey(d){

  return (
    d.getUTCFullYear()
    + "-"
    + pad(d.getUTCMonth()+1)
    + "-"
    + pad(d.getUTCDate())
  );
}

function fmtUTC(d){

  return `
${d.getUTCFullYear()}-${pad(d.getUTCMonth()+1)}-${pad(d.getUTCDate())}
${pad(d.getUTCHours())}:${pad(d.getUTCMinutes())}
  `.trim();
}

function fmtJST(d){

  return `
${d.getUTCFullYear()}-${pad(d.getUTCMonth()+1)}-${pad(d.getUTCDate())}
${pad(d.getUTCHours())}:${pad(d.getUTCMinutes())}
  `.trim();
}

function pad(n){

  return String(n).padStart(2,"0");
}

function hexToRgba(hex,a){

  const h =
    hex.replace("#","");

  const r =
    parseInt(h.slice(0,2),16);

  const g =
    parseInt(h.slice(2,4),16);

  const b =
    parseInt(h.slice(4,6),16);

  return `
rgba(${r},${g},${b},${a})
  `;
}
