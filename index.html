<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SRS Visible Sunspot Viewer</title>
<style>
  body{margin:0;background:#0b0c10;color:#eee;font-family:system-ui,sans-serif}
  header{padding:16px 20px;background:#151720;border-bottom:1px solid #333}
  button{padding:10px 14px;margin:4px;border:0;border-radius:8px;font-weight:700;cursor:pointer}
  main{padding:16px}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(380px,1fr));gap:16px}
  .card{background:#171923;border:1px solid #333;border-radius:14px;padding:14px}
  .sunbox{position:relative;width:100%;aspect-ratio:1/1;background:#000;border-radius:12px;overflow:hidden}
  canvas{position:absolute;inset:0;width:100%;height:100%}
  pre{white-space:pre-wrap;background:#050507;border-radius:10px;padding:10px;max-height:360px;overflow:auto}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{border-bottom:1px solid #333;padding:6px;text-align:left}
  .small{font-size:13px;color:#bbb;line-height:1.5}
  .ok{color:#9ccc65}.warn{color:#ffd54f}.mid{color:#ff9800}.bad{color:#ff5252}
</style>
</head>
<body>

<header>
  <h2>SRS Visible Sunspot Viewer</h2>
  <button onclick="loadLatestSRS()">最新SRSを取得・描画</button>
</header>

<main>
<div class="grid">
  <section class="card">
    <h3>最新SRS：現在見えている黒点領域</h3>
    <div class="sunbox"><canvas id="sunCanvas"></canvas></div>
    <div id="summary" class="small"></div>
  </section>

  <section class="card">
    <h3>AR一覧</h3>
    <div id="table"></div>
  </section>
</div>

<section class="card" style="margin-top:16px">
  <h3>SRS Raw Text</h3>
  <pre id="raw">未取得</pre>
</section>
</main>

<script>
const SRS_URL = "https://services.swpc.noaa.gov/text/srs.txt";

async function loadLatestSRS(){
  try{
    const res = await fetch(SRS_URL + "?t=" + Date.now());
    if(!res.ok) throw new Error("HTTP " + res.status);
    const text = await res.text();

    document.getElementById("raw").textContent = text;

    const srs = parseSRS(text);
    renderSun(srs.regions);
    renderTable(srs);
  }catch(e){
    document.getElementById("raw").textContent = "取得失敗: " + e.message;
  }
}

function parseSRS(text){
  const lines = text.split(/\r?\n/);

  const issued = (text.match(/:Issued:\s*(.+)/) || [])[1] || "";
  const valid = (text.match(/Locations Valid at\s*(.+)/) || [])[1] || "";

  let inSection = false;
  const regions = [];

  for(const line of lines){
    if(line.startsWith("I.  Regions with Sunspots")) {
      inSection = true;
      continue;
    }

    if(inSection && line.startsWith("IA.")) break;
    if(!inSection) continue;

    // 例:
    // 4439 N06W29   242  0010 Hrx  01   01 Alpha
    const m = line.trim().match(
      /^(\d{4})\s+([NS]\d{2}[EW]\d{2})\s+(\d+)\s+(\d+)\s+([A-Za-z]+)\s+(\d+)\s+(\d+)\s+(.+)$/
    );

    if(!m) continue;

    const [, number, location, lo, area, z, ll, nn, magType] = m;
    const pos = parseLocation(location);

    regions.push({
      number,
      location,
      lat: pos.lat,
      lon: pos.lon,
      lo: Number(lo),
      area: Number(area),
      mcintosh: z,
      length: Number(ll),
      spots: Number(nn),
      magType: magType.trim(),
      risk: calcRisk(Number(area), Number(nn), z, magType.trim())
    });
  }

  return {issued, valid, regions};
}

function parseLocation(loc){
  // N06W29 / S19E38
  const m = loc.match(/^([NS])(\d{2})([EW])(\d{2})$/);
  if(!m) return {lat:0, lon:0};

  const lat = (m[1] === "N" ? 1 : -1) * Number(m[2]);

  // 画面表示では W を右、E を左に置く
  const lon = (m[3] === "W" ? 1 : -1) * Number(m[4]);

  return {lat, lon};
}

function calcRisk(area, spots, mcintosh, magType){
  let score = 0;

  score += Math.min(30, area / 10);
  score += Math.min(20, spots * 2);

  const mag = magType.toLowerCase();
  if(mag.includes("alpha")) score += 5;
  if(mag.includes("beta")) score += 15;
  if(mag.includes("gamma")) score += 25;
  if(mag.includes("delta")) score += 35;

  const z = mcintosh.toUpperCase();
  if(z.startsWith("D")) score += 8;
  if(z.startsWith("E")) score += 14;
  if(z.startsWith("F")) score += 20;
  if(z.includes("K")) score += 8;

  return Math.min(100, Math.round(score));
}

function setupCanvas(){
  const c = document.getElementById("sunCanvas");
  const dpr = window.devicePixelRatio || 1;
  const rect = c.getBoundingClientRect();
  c.width = rect.width * dpr;
  c.height = rect.height * dpr;
  const ctx = c.getContext("2d");
  ctx.setTransform(dpr,0,0,dpr,0,0);
  return {ctx,w:rect.width,h:rect.height,cx:rect.width/2,cy:rect.height/2,r:Math.min(rect.width,rect.height)*0.39};
}

function project(latDeg, lonDeg, cx, cy, r){
  const lat = latDeg * Math.PI/180;
  const lon = lonDeg * Math.PI/180;
  return {
    x: cx + r * Math.cos(lat) * Math.sin(lon),
    y: cy - r * Math.sin(lat)
  };
}

function renderSun(regions){
  const {ctx,w,h,cx,cy,r} = setupCanvas();
  ctx.clearRect(0,0,w,h);

  const g = ctx.createRadialGradient(cx-r*.25,cy-r*.25,r*.1,cx,cy,r);
  g.addColorStop(0,"#fff59d");
  g.addColorStop(.55,"#ffb300");
  g.addColorStop(1,"#e65100");

  ctx.beginPath();
  ctx.arc(cx,cy,r,0,Math.PI*2);
  ctx.fillStyle = g;
  ctx.fill();

  ctx.strokeStyle="rgba(255,255,255,.25)";
  ctx.lineWidth=2;
  ctx.stroke();

  drawGrid(ctx,cx,cy,r);

  ctx.fillStyle="#fff";
  ctx.font="13px system-ui";
  ctx.fillText("E",cx-r-24,cy+4);
  ctx.fillText("W",cx+r+12,cy+4);
  ctx.fillText("N",cx-4,cy-r-10);
  ctx.fillText("S",cx-4,cy+r+22);

  regions.forEach(ar => drawAR(ctx, ar, cx, cy, r));

  document.getElementById("summary").innerHTML =
    `表示対象: <b>${regions.length}</b>領域<br>` +
    `※SRSの「I. Regions with Sunspots」のみ使用。II. Regions Due to Returnは描画しません。<br>` +
    `色: 緑=低、黄=注意、橙=中、赤=高`;
}

function drawGrid(ctx,cx,cy,r){
  ctx.strokeStyle="rgba(255,255,255,.16)";
  ctx.lineWidth=1;

  [-60,-30,0,30,60].forEach(lat=>{
    const y = cy - Math.sin(lat*Math.PI/180)*r;
    const scale = Math.cos(lat*Math.PI/180);
    ctx.beginPath();
    ctx.ellipse(cx,y,r*scale,r*.1,0,0,Math.PI*2);
    ctx.stroke();
  });

  [-60,-30,0,30,60].forEach(lon=>{
    ctx.beginPath();
    for(let lat=-89;lat<=89;lat+=3){
      const p = project(lat,lon,cx,cy,r);
      if(lat === -89) ctx.moveTo(p.x,p.y);
      else ctx.lineTo(p.x,p.y);
    }
    ctx.stroke();
  });
}

function riskColor(score){
  if(score >= 75) return "#ff1744";
  if(score >= 55) return "#ff9100";
  if(score >= 30) return "#ffee58";
  return "#9ccc65";
}

function drawAR(ctx, ar, cx, cy, r){
  const p = project(ar.lat, ar.lon, cx, cy, r);
  const size = Math.max(5, Math.min(26, Math.sqrt(ar.area) * 0.75));
  const color = riskColor(ar.risk);

  ctx.beginPath();
  ctx.arc(p.x,p.y,size+7,0,Math.PI*2);
  ctx.fillStyle = color + "55";
  ctx.fill();

  ctx.fillStyle="#050505";
  ctx.strokeStyle=color;
  ctx.lineWidth=2;

  const mag = ar.magType.toLowerCase();

  if(mag.includes("delta") || mag.includes("gamma")){
    ctx.beginPath();
    for(let i=0;i<12;i++){
      const a = i/12*Math.PI*2;
      const rr = size * (i%2 ? 0.65 : 1.15);
      const x = p.x + Math.cos(a)*rr;
      const y = p.y + Math.sin(a)*rr;
      if(i===0) ctx.moveTo(x,y);
      else ctx.lineTo(x,y);
    }
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
  }else if(mag.includes("beta")){
    ctx.beginPath();
    ctx.ellipse(p.x,p.y,size*1.3,size*0.75,0.5,0,Math.PI*2);
    ctx.fill();
    ctx.stroke();
  }else{
    ctx.beginPath();
    ctx.arc(p.x,p.y,size,0,Math.PI*2);
    ctx.fill();
    ctx.stroke();
  }

  const n = Math.min(10, Math.max(1, ar.spots));
  for(let i=0;i<n;i++){
    const a = i/n*Math.PI*2;
    ctx.beginPath();
    ctx.arc(
      p.x + Math.cos(a)*size*1.15,
      p.y + Math.sin(a)*size*.65,
      Math.max(2,size*.16),
      0,
      Math.PI*2
    );
    ctx.fillStyle="#000";
    ctx.fill();
  }

  ctx.fillStyle="#fff";
  ctx.font="12px system-ui";
  ctx.fillText("AR"+ar.number,p.x+size+8,p.y-5);

  ctx.fillStyle=color;
  ctx.font="11px system-ui";
  ctx.fillText("R"+ar.risk,p.x+size+8,p.y+9);
}

function renderTable(srs){
  const rows = [...srs.regions].sort((a,b)=>b.risk-a.risk);

  document.getElementById("table").innerHTML = `
    <div class="small">
      Issued: ${srs.issued || "不明"}<br>
      Valid: ${srs.valid || "不明"}
    </div>
    <table>
      <tr>
        <th>AR</th><th>位置</th><th>Area</th><th>Z</th><th>LL</th><th>NN</th><th>Mag</th><th>Risk</th>
      </tr>
      ${rows.map(r=>`
        <tr>
          <td>${r.number}</td>
          <td>${r.location}</td>
          <td>${r.area}</td>
          <td>${r.mcintosh}</td>
          <td>${r.length}</td>
          <td>${r.spots}</td>
          <td>${r.magType}</td>
          <td style="color:${riskColor(r.risk)};font-weight:700">${r.risk}</td>
        </tr>
      `).join("")}
    </table>
  `;
}

loadLatestSRS();
</script>

</body>
</html>
