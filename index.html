<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Solar Numeric Risk Viewer</title>
<style>
  body{margin:0;background:#0b0c10;color:#eee;font-family:system-ui,sans-serif}
  header{padding:16px 20px;background:#151720;border-bottom:1px solid #333}
  button{padding:10px 14px;margin:4px;border:0;border-radius:8px;font-weight:700;cursor:pointer}
  main{padding:16px}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(370px,1fr));gap:16px}
  .card{background:#171923;border:1px solid #333;border-radius:14px;padding:14px}
  .sunbox{position:relative;width:100%;aspect-ratio:1/1;background:#000;border-radius:12px;overflow:hidden}
  canvas{position:absolute;inset:0;width:100%;height:100%}
  pre{white-space:pre-wrap;background:#050507;border-radius:10px;padding:10px;max-height:360px;overflow:auto}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{border-bottom:1px solid #333;padding:6px;text-align:left}
  .small{font-size:13px;color:#bbb;line-height:1.5}
  .ok{color:#9ccc65}.warn{color:#ffd54f}.mid{color:#ff9800}.bad{color:#ff5252}
</style>
</head>
<body>

<header>
  <h2>Solar Numeric Risk Viewer</h2>
  <button onclick="loadAll()">全部取得・描画</button>
  <button onclick="loadRegionsOnly()">SRS系ARのみ</button>
  <button onclick="loadCmeSepOnly()">CME/SEPのみ</button>
</header>

<main>
<div class="grid">
  <section class="card">
    <h3>① SRS系 黒点・活動領域リスク太陽面</h3>
    <div class="sunbox"><canvas id="arCanvas"></canvas></div>
    <div id="arSummary" class="small"></div>
  </section>

  <section class="card">
    <h3>② CME / SEP 候補太陽面</h3>
    <div class="sunbox"><canvas id="eventCanvas"></canvas></div>
    <div id="eventSummary" class="small"></div>
  </section>
</div>

<section class="card" style="margin-top:16px">
  <h3>ARリスクランキング</h3>
  <div id="ranking"></div>
</section>

<section class="card" style="margin-top:16px">
  <h3>Raw Output</h3>
  <pre id="raw">未取得</pre>
</section>
</main>

<script>
const API = {
  regions: "https://services.swpc.noaa.gov/json/solar_regions.json",
  xrays: "https://services.swpc.noaa.gov/json/goes/primary/xrays-6-hour.json",
  flares: "https://services.swpc.noaa.gov/json/goes/primary/xray-flares-7-day.json",
  protons: "https://services.swpc.noaa.gov/json/goes/primary/integral-protons-6-hour.json"
};

const NASA_KEY = "DEMO_KEY";

function todayUTC(){
  return new Date().toISOString().slice(0,10);
}
function daysAgoUTC(n){
  const d = new Date();
  d.setUTCDate(d.getUTCDate() - n);
  return d.toISOString().slice(0,10);
}
function donkiCmeUrl(){
  return `https://api.nasa.gov/DONKI/CME?startDate=${daysAgoUTC(7)}&endDate=${todayUTC()}&api_key=${NASA_KEY}`;
}

async function fetchJson(url){
  const r = await fetch(url);
  if(!r.ok) throw new Error(`${r.status} ${url}`);
  return await r.json();
}
function raw(obj){ document.getElementById("raw").textContent = JSON.stringify(obj,null,2); }

function setupCanvas(id){
  const c = document.getElementById(id);
  const dpr = devicePixelRatio || 1;
  const rect = c.getBoundingClientRect();
  c.width = rect.width*dpr;
  c.height = rect.height*dpr;
  const ctx = c.getContext("2d");
  ctx.setTransform(dpr,0,0,dpr,0,0);
  return {ctx,w:rect.width,h:rect.height,cx:rect.width/2,cy:rect.height/2,r:Math.min(rect.width,rect.height)*0.39};
}

function drawSunBase(id,title){
  const o = setupCanvas(id);
  const {ctx,cx,cy,r,w,h}=o;
  ctx.clearRect(0,0,w,h);
  const g = ctx.createRadialGradient(cx-r*.25,cy-r*.25,r*.1,cx,cy,r);
  g.addColorStop(0,"#fff59d"); g.addColorStop(.55,"#ffb300"); g.addColorStop(1,"#e65100");
  ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.fillStyle=g; ctx.fill();
  ctx.strokeStyle="rgba(255,255,255,.28)"; ctx.lineWidth=2; ctx.stroke();

  ctx.strokeStyle="rgba(255,255,255,.18)"; ctx.lineWidth=1;
  [-60,-30,0,30,60].forEach(lat=>{
    const y=cy-Math.sin(lat*Math.PI/180)*r;
    const scale=Math.cos(lat*Math.PI/180);
    ctx.beginPath(); ctx.ellipse(cx,y,r*scale,r*.1,0,0,Math.PI*2); ctx.stroke();
  });
  [-60,-30,0,30,60].forEach(lon=>{
    ctx.beginPath();
    for(let lat=-89;lat<=89;lat+=3){
      const p=project(lat,lon,cx,cy,r);
      if(lat===-89) ctx.moveTo(p.x,p.y); else ctx.lineTo(p.x,p.y);
    }
    ctx.stroke();
  });

  ctx.fillStyle="#fff"; ctx.font="13px system-ui";
  ctx.fillText("N",cx-4,cy-r-9); ctx.fillText("S",cx-4,cy+r+20);
  ctx.fillText("E",cx-r-22,cy+4); ctx.fillText("W",cx+r+12,cy+4);
  ctx.fillText(title,12,22);
  return o;
}

function project(latDeg, lonDeg, cx, cy, r){
  const lat=latDeg*Math.PI/180, lon=lonDeg*Math.PI/180;
  return {x:cx+r*Math.cos(lat)*Math.sin(lon), y:cy-r*Math.sin(lat)};
}

function normLon(lon){
  let x = Number(lon || 0);
  if(x > 180) x -= 360;
  return Math.max(-90, Math.min(90, x));
}

function fieldClass(ar){
  const s = [
    ar.mag_class, ar.magnetic_class, ar.magnetic_classification,
    ar.hale_class, ar.mcintosh_class
  ].filter(Boolean).join(" ").toLowerCase();

  if(s.includes("delta") || s.includes("δ")) return "βγδ/δ";
  if(s.includes("beta-gamma") || s.includes("βγ")) return "βγ";
  if(s.includes("beta") || s.includes("β")) return "β";
  return "不明";
}

function riskColor(score){
  if(score>=80) return "#ff1744";
  if(score>=60) return "#ff9100";
  if(score>=35) return "#ffee58";
  return "#9ccc65";
}

function flareClassScore(flareClass){
  if(!flareClass) return 0;
  const s=String(flareClass).toUpperCase();
  if(s.startsWith("X")) return 35;
  if(s.startsWith("M")) return 20;
  if(s.startsWith("C")) return 8;
  return 0;
}

function calcARRisk(ar, recentFlares){
  const area = Number(ar.area || ar.spot_area || ar.corrected_area || 0);
  const spots = Number(ar.number_spots || ar.spot_count || ar.num_spots || 1);
  const mc = String(ar.mcintosh_class || "").toUpperCase();
  const fc = fieldClass(ar);

  let score = 0;
  score += Math.min(30, area / 18);
  score += Math.min(20, spots * 2);

  if(fc==="β") score += 10;
  if(fc==="βγ") score += 28;
  if(fc==="βγδ/δ") score += 45;

  if(mc.includes("D")) score += 8;
  if(mc.includes("E")) score += 12;
  if(mc.includes("F")) score += 16;
  if(mc.includes("K")) score += 8;

  const arNum = String(ar.region || "");
  const linked = recentFlares.filter(f => JSON.stringify(f).includes(arNum));
  score += Math.min(25, linked.reduce((a,f)=>a+flareClassScore(f.class_type),0));

  return Math.min(100, Math.round(score));
}

function drawAR(ctx, ar, cx, cy, r, score){
  const lat = Number(ar.latitude || ar.lat || 0);
  const lon = normLon(ar.longitude || ar.lon || 0);
  const p = project(lat,lon,cx,cy,r);
  const area = Number(ar.area || ar.spot_area || ar.corrected_area || 80);
  const spots = Number(ar.number_spots || ar.spot_count || ar.num_spots || 1);
  const size = Math.max(6, Math.min(30, Math.sqrt(area)*0.75));
  const col = riskColor(score);
  const fc = fieldClass(ar);

  ctx.beginPath(); ctx.arc(p.x,p.y,size+7,0,Math.PI*2); ctx.fillStyle=col+"55"; ctx.fill();

  ctx.fillStyle="#090909"; ctx.strokeStyle=col; ctx.lineWidth=2;
  if(fc==="βγδ/δ"){
    ctx.beginPath();
    for(let i=0;i<12;i++){
      const a=i/12*Math.PI*2, rr=size*(i%2?.65:1.2);
      const x=p.x+Math.cos(a)*rr, y=p.y+Math.sin(a)*rr;
      i?ctx.lineTo(x,y):ctx.moveTo(x,y);
    }
    ctx.closePath(); ctx.fill(); ctx.stroke();
  }else if(fc==="βγ"){
    ctx.beginPath(); ctx.ellipse(p.x,p.y,size*1.35,size*.75,.45,0,Math.PI*2); ctx.fill(); ctx.stroke();
  }else{
    ctx.beginPath(); ctx.arc(p.x,p.y,size,0,Math.PI*2); ctx.fill(); ctx.stroke();
  }

  const n=Math.min(10,Math.max(1,spots));
  for(let i=0;i<n;i++){
    const a=i/n*Math.PI*2;
    ctx.beginPath();
    ctx.arc(p.x+Math.cos(a)*size*1.15,p.y+Math.sin(a)*size*.65,Math.max(2,size*.16),0,Math.PI*2);
    ctx.fillStyle="#000"; ctx.fill();
  }

  ctx.fillStyle="#fff"; ctx.font="12px system-ui";
  ctx.fillText("AR"+(ar.region||"?"),p.x+size+8,p.y-4);
  ctx.fillStyle=col; ctx.fillText(score,p.x+size+8,p.y+10);
}

function drawCmeEvent(ctx,cx,cy,r,cme,i,total){
  const a = (i/Math.max(1,total))*Math.PI*2 - Math.PI/2;
  const rr = r*.55;
  const x = cx + Math.cos(a)*rr;
  const y = cy + Math.sin(a)*rr;
  const speed = Number(cme.cmeAnalyses?.[0]?.speed || 0);
  const col = speed>=1000 ? "#ff1744" : speed>=600 ? "#ff9100" : "#ffee58";
  ctx.beginPath(); ctx.arc(x,y,12,0,Math.PI*2); ctx.fillStyle=col+"cc"; ctx.fill();
  ctx.fillStyle="#fff"; ctx.font="11px system-ui";
  ctx.fillText("CME",x+14,y);
  if(speed) ctx.fillText(speed+" km/s",x+14,y+13);
}

async function loadAll(){
  try{
    const [regions, xrays, flares, protons, cmes] = await Promise.all([
      fetchJson(API.regions),
      fetchJson(API.xrays),
      fetchJson(API.flares).catch(()=>[]),
      fetchJson(API.protons),
      fetchJson(donkiCmeUrl()).catch(()=>[])
    ]);
    renderAll(regions,xrays,flares,protons,cmes);
  }catch(e){
    document.getElementById("raw").textContent = "取得失敗: " + e.message;
  }
}

async function loadRegionsOnly(){
  const [regions,flares] = await Promise.all([fetchJson(API.regions), fetchJson(API.flares).catch(()=>[])]);
  renderRegions(regions,flares);
  raw({regions,flares});
}

async function loadCmeSepOnly(){
  const [protons,cmes] = await Promise.all([fetchJson(API.protons), fetchJson(donkiCmeUrl()).catch(()=>[])]);
  renderEvents(protons,cmes);
  raw({protons,cmes});
}

function renderAll(regions,xrays,flares,protons,cmes){
  renderRegions(regions,flares);
  renderEvents(protons,cmes);
  raw({regions,xrays_latest:xrays.at(-1),flares_recent:flares.slice(-10),protons_latest:protons.slice(-10),cmes});
}

function renderRegions(regions,flares){
  const {ctx,cx,cy,r}=drawSunBase("arCanvas","AR Risk");
  const ars = regions.filter(x=>x.region).slice(-50).map(ar=>({
    ...ar,
    risk: calcARRisk(ar,flares || [])
  })).sort((a,b)=>b.risk-a.risk);

  ars.forEach(ar=>drawAR(ctx,ar,cx,cy,r,ar.risk));

  document.getElementById("arSummary").innerHTML =
    `活動領域数: <b>${ars.length}</b><br>` +
    `高リスク候補: <b class="${ars.some(x=>x.risk>=60)?"bad":"ok"}">${ars.filter(x=>x.risk>=60).length}</b><br>` +
    `色: 緑=低、黄=注意、橙=中、赤=高`;

  document.getElementById("ranking").innerHTML = `
    <table>
      <tr><th>AR</th><th>Risk</th><th>Lat</th><th>Lon</th><th>Area</th><th>Spots</th><th>McIntosh</th><th>磁場</th></tr>
      ${ars.map(a=>`
        <tr>
          <td>AR${a.region}</td>
          <td style="color:${riskColor(a.risk)};font-weight:700">${a.risk}</td>
          <td>${a.latitude ?? "?"}</td>
          <td>${normLon(a.longitude ?? 0)}</td>
          <td>${a.area ?? a.spot_area ?? "?"}</td>
          <td>${a.number_spots ?? a.spot_count ?? "?"}</td>
          <td>${a.mcintosh_class ?? "?"}</td>
          <td>${fieldClass(a)}</td>
        </tr>`).join("")}
    </table>`;
}

function renderEvents(protons,cmes){
  const {ctx,cx,cy,r}=drawSunBase("eventCanvas","CME / SEP");
  const p10 = protons.filter(x=>String(x.energy).includes(">=10 MeV")).at(-1);
  const p100 = protons.filter(x=>String(x.energy).includes(">=100 MeV")).at(-1);

  const recentCmes = (cmes || []).slice(-12);
  recentCmes.forEach((c,i)=>drawCmeEvent(ctx,cx,cy,r,c,i,recentCmes.length));

  const sep = Number(p10?.flux || 0);
  const sepClass = sep>=10 ? "bad" : sep>=1 ? "warn" : "ok";
  const sepText = sep>=10 ? "S1以上レベル" : sep>=1 ? "上昇注意" : "通常";

  document.getElementById("eventSummary").innerHTML =
    `>=10MeV Proton: <b class="${sepClass}">${p10?.flux ?? "?"}</b> pfu / ${sepText}<br>` +
    `>=100MeV Proton: <b>${p100?.flux ?? "?"}</b> pfu<br>` +
    `DONKI CME件数: <b>${recentCmes.length}</b><br>` +
    `CME色: 黄=低速、橙=中速、赤=高速`;
}
</script>

</body>
</html>
